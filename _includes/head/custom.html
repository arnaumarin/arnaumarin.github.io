<!-- Tab Navigation -->
<style>
.cv-tabs { margin-top: 1.5em; }

.tab-nav {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tab-nav::-webkit-scrollbar { display: none; }

.tab-btn {
  padding: 10px 24px;
  border: 1.5px solid #ddd;
  background: #fafafa;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  color: #666;
  transition: all 0.25s;
  white-space: nowrap;
  font-family: inherit;
}
.tab-btn:hover { background: #f0f0f0; border-color: #bbb; color: #494e52; }
.tab-btn.active { background: #494e52; border-color: #494e52; color: #fff; }

.tab-pane {
  display: none;
  padding-top: 1.2em;
}
.tab-pane.active {
  display: block;
  animation: cvFadeIn 0.3s ease;
}
@keyframes cvFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Publication Filters */
.pub-filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 1.2em;
}
.filter-btn {
  padding: 5px 14px;
  border: 1px solid #ddd;
  background: #fafafa;
  border-radius: 100px;
  cursor: pointer;
  font-size: 13px;
  color: #666;
  transition: all 0.2s;
  font-family: inherit;
}
.filter-btn:hover { background: #f0f0f0; border-color: #ccc; }
.filter-btn.active { color: #fff; }
.filter-btn[data-filter="all"].active   { background: #494e52; border-color: #494e52; }
.filter-btn[data-filter="neuro"].active { background: #1565c0; border-color: #1565c0; }
.filter-btn[data-filter="dl"].active    { background: #7b1fa2; border-color: #7b1fa2; }
.filter-btn[data-filter="genomics"].active { background: #2e7d32; border-color: #2e7d32; }
.filter-btn[data-filter="ai4sci"].active   { background: #e65100; border-color: #e65100; }

/* Publication List */
.pub-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.pub-item {
  padding: 12px 0;
  border-bottom: 1px solid #f0f0f0;
  line-height: 1.65;
  font-size: 0.91em;
}
.pub-item:last-child { border-bottom: none; }
.pub-item.hidden { display: none; }

/* Thumbnail layout — only applied when the item has a .pub-thumb */
.pub-item:has(.pub-thumb) {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.pub-thumb {
  flex: 0 0 110px;
  width: 110px;
  height: 80px;
  border-radius: 4px;
  overflow: hidden;
  background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}
.pub-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.pub-content { flex: 1; min-width: 0; }
@media (max-width: 600px) {
  .pub-thumb { flex-basis: 80px; width: 80px; height: 60px; }
}

/* Large card layout — used on the dedicated /publications/ page */
.pub-list-large .pub-item {
  padding: 22px 0;
  font-size: 0.96em;
  gap: 22px;
  align-items: flex-start;
}
.pub-list-large .pub-thumb {
  flex: 0 0 260px;
  width: 260px;
  height: 170px;
  border-radius: 6px;
  border: 1px solid #ececec;
  background: linear-gradient(135deg, #fafafa 0%, #ececec 100%);
}
.pub-list-large .pub-thumb img { object-fit: contain; background: #fff; }
.pub-list-large .pub-title {
  font-size: 1.08em;
  line-height: 1.35;
  margin-bottom: 4px;
  color: #2a2a2a;
}
.pub-list-large .pub-authors { color: #444; margin-bottom: 2px; }
.pub-list-large .pub-venue   { color: #666; font-size: 0.93em; margin-bottom: 10px; }
.pub-list-large .pub-meta-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.pub-list-large .pub-link {
  font-size: 12px;
  padding: 3px 11px;
}
.pub-list-large .pub-tag { font-size: 11px; padding: 2px 9px; }
@media (max-width: 720px) {
  .pub-list-large .pub-item { flex-direction: column; gap: 14px; }
  .pub-list-large .pub-thumb { flex-basis: auto; width: 100%; height: 200px; }
}

/* Category Tags */
.pub-tags {
  display: inline;
  margin-left: 4px;
}
.pub-tag {
  display: inline-block;
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 10px;
  font-weight: 600;
  letter-spacing: 0.2px;
  text-transform: uppercase;
  vertical-align: middle;
  margin-top: -1px;
}
.tag-neuro   { background: #e3f2fd; color: #1565c0; }
.tag-dl      { background: #f3e5f5; color: #7b1fa2; }
.tag-genomics { background: #e8f5e9; color: #2e7d32; }
.tag-ai4sci  { background: #fff3e0; color: #e65100; }

/* Publication links */
.pub-links { margin-left: 4px; display: inline; }
.pub-link {
  display: inline-block;
  font-size: 10px;
  padding: 1px 8px;
  border-radius: 10px;
  font-weight: 600;
  text-decoration: none;
  margin-left: 2px;
  background: #f0f0f0;
  color: #494e52;
  vertical-align: middle;
  transition: all 0.2s;
}
.pub-link:hover { background: #494e52; color: #fff; }
/* Beat the theme's content-link underline (".page__content p a" etc.) */
.page__content a.pub-link,
.page__content a.pub-link:hover,
.page__content a.news-thumb { text-decoration: none; border-bottom: none; }

/* TL;DR toggle — button reuses the pub-link pill look */
button.tldr-btn {
  border: 1px dashed #b4b4b4;
  background: #fff;
  cursor: pointer;
  font-family: inherit;
  line-height: inherit;
}
button.tldr-btn:hover { background: #494e52; border-color: #494e52; color: #fff; }
button.tldr-btn.active { background: #494e52; border-color: #494e52; color: #fff; }
.pub-tldr {
  display: none;
  margin-top: 10px;
  padding: 8px 14px;
  background: #f8f9fa;
  border-left: 3px solid #494e52;
  border-radius: 0 6px 6px 0;
  font-size: 0.92em;
  font-style: italic;
  color: #555;
  line-height: 1.6;
}
.pub-tldr.open { display: block; animation: cvFadeIn 0.25s ease; }

/* News — timeline with optional thumbnails and show-more expander */
.news-timeline {
  list-style: none;
  padding: 0;
  margin: 0;
  position: relative;
}
.news-timeline::before {
  content: '';
  position: absolute;
  left: 5px;
  top: 10px;
  bottom: 10px;
  width: 2px;
  background: #e0e0e0;
}
.news-item {
  position: relative;
  padding-left: 26px;
  padding-bottom: 22px;
  font-size: 0.92em;
  line-height: 1.65;
}
.news-item:last-child { padding-bottom: 0; }
.news-item::before {
  content: '';
  position: absolute;
  left: 1px;
  top: 8px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #494e52;
}
/* Accent the most recent item's dot */
.news-item:first-child::before {
  background: #1565c0;
  box-shadow: 0 0 0 4px rgba(21, 101, 192, 0.15);
}
.news-item.news-hidden { display: none; }
.news-date {
  font-weight: 600;
  color: #494e52;
  font-size: 0.9em;
}

/* News item body — text + optional thumbnail side by side */
.news-body {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  margin-top: 2px;
}
.news-text { flex: 1; min-width: 0; }
.news-thumb {
  flex: 0 0 128px;
  width: 128px;
  height: 88px;
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid #ececec;
  background: #fafafa;
  display: block;
}
.news-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.25s ease;
}
.news-thumb:hover img { transform: scale(1.05); }
@media (max-width: 600px) {
  .news-thumb { flex-basis: 92px; width: 92px; height: 66px; }
}

/* News type badges — same shape as pub tags */
.tag-talk      { background: #e3f2fd; color: #1565c0; }
.tag-paper     { background: #e8f5e9; color: #2e7d32; }
.tag-spotlight { background: #fff3e0; color: #e65100; }
.tag-award     { background: #fce4ec; color: #c2185b; }

/* News link chips reuse .pub-link; row spacing */
.news-links { margin-top: 4px; }

/* Show-more toggle */
#news-toggle {
  display: inline-block;
  margin-top: 12px;
  padding: 5px 16px;
  border: 1px solid #ddd;
  border-radius: 100px;
  background: #fafafa;
  font-size: 13px;
  color: #666;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
#news-toggle:hover { background: #f0f0f0; border-color: #bbb; color: #494e52; }

/* Email obfuscation separators */
.email-sep {
  color: #888;
  font-style: italic;
  font-size: 0.9em;
  padding: 0 1px;
}

/* Media items */
.media-item {
  padding: 12px 0;
  border-bottom: 1px solid #f0f0f0;
  line-height: 1.65;
  font-size: 0.93em;
}
.media-item:last-child { border-bottom: none; }

/* Section lists in tabs */
.tab-pane ul:not(.pub-list) {
  padding-left: 1.2em;
}
.tab-pane ul:not(.pub-list) li {
  margin-bottom: 0.4em;
  line-height: 1.6;
}

@media (max-width: 600px) {
  .tab-btn { padding: 8px 14px; font-size: 14px; }
  .filter-btn { font-size: 12px; padding: 4px 10px; }
  .pub-tag { font-size: 9px; }
}
</style>
